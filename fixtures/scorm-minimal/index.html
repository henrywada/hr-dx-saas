<!DOCTYPE html>
<html lang="ja">
<head><meta charset="utf-8" /><title>QA SCORM</title></head>
<body>
  <h1>HR-DX SCORM QA</h1>
  <p id="status">初期化中…</p>
  <button id="complete">修了する</button>
  <script>
    function findAPI(win) {
      var attempts = 0;
      while (win && attempts < 10) {
        if (win.API) return win.API;
        if (win.parent && win.parent !== win) { win = win.parent; attempts++; continue; }
        break;
      }
      return null;
    }
    var API = findAPI(window);
    var el = document.getElementById('status');
    if (!API) { el.textContent = 'API 未検出'; }
    else {
      API.LMSInitialize('');
      API.LMSSetValue('cmi.core.lesson_status', 'incomplete');
      el.textContent = '受講中';
      document.getElementById('complete').onclick = function() {
        API.LMSSetValue('cmi.core.lesson_status', 'completed');
        API.LMSCommit('');
        API.LMSFinish('');
        el.textContent = '修了しました';
      };
    }
  </script>
</body>
</html>
